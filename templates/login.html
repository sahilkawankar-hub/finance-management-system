<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinTrack - Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background-color: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background-color: #151e2e;
      border: 1px solid #1f2d45;
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background-color: #f59e0b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      color: #000000;
      letter-spacing: -1px;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .demo-hint {
      text-align: center;
      background: rgba(245,158,11,0.12);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 32px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background-color: #0a0e1a;
      border: 1px solid #1f2d45;
      border-radius: 12px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
    }

    .btn-login {
      width: 100%;
      background-color: #f59e0b;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.2s;
      margin-bottom: 16px;
    }

    .btn-login:hover {
      background-color: #d97706;
    }

    .forgot {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      text-decoration: none;
    }

    .forgot:hover {
      color: #f59e0b;
    }

    .error {
      background-color: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
        margin: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">FT</div>
      <span class="logo-text">FinTrack</span>
    </div>

    <h1>Welcome Back</h1>
    <p style="text-align: center; color: #64748b; margin-bottom: 32px; font-size: 15px;">
      Sign in to your account
    </p>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="error" style="display: block;">
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}
<div id="error-msg" class="error"></div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="demo-hint">
      💡 Demo: user / pass123
    </div>

    <a href="#" class="forgot">Forgot Password?</a>
  </div>
</body>
</html>
